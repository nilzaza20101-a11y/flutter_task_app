name: flutter_task_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1
 
environment:
  sdk: ">=3.2.0 <4.0.0"
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2 #ใฃ้ font fonts.google.com
  font_awesome_flutter: ^10.12.0 #ใช้ icon แปลกๆ จากfont awesome.com
  supabase_flutter: ^2.12.0
  image_picker: ^1.2.1 #ใช้เปิดกล้อง
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3 #ใฃ้สร้าง icon ของแอป ทั้ง ios/Android
 
icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
 
flutter:
  uses-material-design: true
  assets:
    - assets/images/
 